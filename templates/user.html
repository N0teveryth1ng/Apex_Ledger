<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet - Apex Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
            color: #333;
        }

        /* Navbar */
        .navbar {
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .navbar .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .navbar .logout {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.2s;
        }
        .navbar .logout:hover { color: #fff; }

        /* Main card */
        .card {
            background: #fff;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        /* Balance section */
        .balance-section {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 36px 32px;
            color: #fff;
        }
        .balance-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        .balance-amount {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .balance-amount span {
            font-size: 1.8rem;
            font-weight: 500;
            margin-right: 2px;
        }
        .welcome-text {
            margin-top: 20px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
        }
        .welcome-text strong {
            color: rgba(255,255,255,0.85);
            font-weight: 600;
        }

        /* Transfer section */
        .transfer-section {
            padding: 32px;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .section-sub {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            transition: border-color 0.2s;
            outline: none;
            background: #f9fafb;
        }
        input:focus {
            border-color: #302b63;
            background: #fff;
        }
        input::placeholder { color: #d1d5db; }

        .fee-note {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: -8px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #302b63, #24243e);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.99); }
    </style>
</head>
<body>

    <nav class="navbar">
        <span class="logo">⬡ Apex Ledger</span>
        <a href="/" class="logout">Sign out →</a>
    </nav>

    <div class="card">
        <div class="balance-section">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount"><span>₹</span>{{ "%.2f"|format(balance) }}</div>
            <div class="welcome-text">Logged in as <strong>{{ username }}</strong></div>
        </div>

        <div class="transfer-section">
            <div class="section-title">Send Money</div>
            <div class="section-sub">Transfer funds instantly to any user</div>

            <form action="/transfer" method="post">
                <input type="hidden" name="idempotency_key" value="{{ idempotency_key }}">

                <div class="form-group">
                    <label for="receiver">Recipient Username</label>
                    <input type="text" id="receiver" name="receiver_username" placeholder="e.g. simon_dev" required>
                </div>

                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" min="10" step="0.01" placeholder="0.00" required>
                </div>
                <div class="fee-note">A 1.5% platform fee applies. Minimum transfer ₹10.</div>

                <button type="submit">Confirm Transfer</button>
            </form>
        </div>
    </div>

</body>
</html>
